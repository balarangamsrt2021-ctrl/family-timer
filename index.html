<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Time Pro</title>
    <style>
        :root { --primary: #4a90e2; --stop: #ff4757; --bg: #f8f9fa; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 450px; box-sizing: border-box; }
        h1 { color: #333; font-size: 22px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { padding: 18px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-member { background: #f0f4ff; color: var(--primary); border: 1px solid #d0d9ff; }
        .btn-action { background: var(--primary); color: white; width: 100%; margin-top: 15px; }
        .btn-stop { background: var(--stop) !important; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        
        /* Grouping Styles */
        .group-header { background: #eee; padding: 8px 15px; border-radius: 8px; margin-top: 20px; font-weight: bold; color: #555; text-align: left; }
        .user-subgroup { margin-left: 10px; border-left: 3px solid var(--primary); padding-left: 10px; margin-top: 10px; text-align: left; }
        .log-entry { font-size: 14px; padding: 5px 0; color: #444; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>👨‍👩‍👧‍👦 Family Time Logger</h1>
    
    <div id="setup-step" class="grid">
        <button class="btn-member" onclick="start('Dad')">Dad</button>
        <button class="btn-member" onclick="start('Mom')">Mom</button>
        <button class="btn-member" onclick="start('Teen')">Teen</button>
        <button class="btn-member" onclick="start('Kid')">Kid</button>
    </div>

    <div id="active-step" class="hidden">
        <h2 id="user-display">Hi!</h2>
        <input type="text" id="task" placeholder="What activity? (e.g. Reading)">
        <button id="main-btn" class="btn-action" onclick="toggleTimer()">Start Timer</button>
        <button class="btn-action" style="background:#888" onclick="location.reload()">Cancel</button>
    </div>
</div>

<div id="history" style="width:100%; max-width:450px;"></div>

<script>
    let currentUser = "", startTime, isRunning = false;

    function start(name) {
        currentUser = name;
        document.getElementById('setup-step').classList.add('hidden');
        document.getElementById('active-step').classList.remove('hidden');
        document.getElementById('user-display').innerText = "Logging for " + name;
    }

    function toggleTimer() {
        const btn = document.getElementById('main-btn');
        if (!isRunning) {
            startTime = new Date();
            isRunning = true;
            btn.innerText = "🛑 STOP & SAVE";
            btn.classList.add('btn-stop');
        } else {
            const endT = new Date();
            const mins = Math.round((endT - startTime) / 60000); // Minutes
            const task = document.getElementById('task').value || "Activity";
            
            saveLog({
                user: currentUser,
                task: task,
                minutes: mins,
                date: endT.toLocaleDateString(), // e.g. "3/27/2026"
                timestamp: endT.getTime()
            });
            location.reload();
        }
    }

    function saveLog(entry) {
        let logs = JSON.parse(localStorage.getItem('family_v2')) || [];
        logs.push(entry);
        localStorage.setItem('family_v2', JSON.stringify(logs));
    }

    function displayGroupedLogs() {
        const logs = JSON.parse(localStorage.getItem('family_v2')) || [];
        if (logs.length === 0) return;

        // Sort by timestamp (newest first)
        logs.sort((a, b) => b.timestamp - a.timestamp);

        // Group by Date
        const grouped = logs.reduce((acc, log) => {
            if (!acc[log.date]) acc[log.date] = {};
            if (!acc[log.date][log.user]) acc[log.date][log.user] = [];
            acc[log.date][log.user].push(log);
            return acc;
        }, {});

        let html = "";
        for (const date in grouped) {
            html += `<div class="group-header">📅 ${date}</div>`;
            for (const person in grouped[date]) {
                html += `<div class="user-subgroup"><strong>👤 ${person}</strong>`;
                grouped[date][person].forEach(item => {
                    html += `
                        <div class="log-entry">
                            <span>${item.task}</span>
                            <span>${item.minutes}m</span>
                        </div>`;
                });
                html += `</div>`;
            }
        }
        document.getElementById('history').innerHTML = html;
    }

    displayGroupedLogs();
</script>
</body>
</html>
